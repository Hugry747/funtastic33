<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7F4F24"/>
      <stop offset="100%" stop-color="#A47148"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#FFFFFF" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="800" height="800" fill="url(#g)"/>
  <rect width="800" height="800" fill="url(#dots)"/>
  <!-- formes décoratives -->
  <circle cx="680" cy="120" r="96" fill="#FFC93C" opacity="0.85"/>
  <circle cx="96" cy="704" r="64" fill="#FFFFFF" opacity="0.25"/>
  <!-- emoji central -->
  <text x="50%" y="44%" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif" font-size="256" text-anchor="middle" dominant-baseline="middle">🎲</text>
  <!-- titre -->
  <text x="50%" y="72%" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-weight="800" font-size="60" text-anchor="middle" fill="#FFFFFF" letter-spacing="1.5">JEUX EN BOIS</text>
  <text x="50%" y="83%" font-family="'Outfit', system-ui, sans-serif" font-weight="500" font-size="28" text-anchor="middle" fill="#FFFFFF" opacity="0.85">FUNTASTIC · BASSIN D'ARCACHON</text>
</svg>