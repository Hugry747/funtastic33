  <text x="50%" y="83%" font-family="'Outfit', system-ui, sans-serif" font-weight="500" font-size="21" text-anchor="middle" fill="#FFFFFF" opacity="0.85">FUNTASTIC · BASSIN D'ARCACHON</text>
