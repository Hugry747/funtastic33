      <stop offset="0%" stop-color="#D946EF"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="2" fill="#FFFFFF" opacity="0.18"/>
