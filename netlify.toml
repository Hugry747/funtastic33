# =============================================================
# CONFIGURATION NETLIFY pour funtastic33.fr
# =============================================================
# Ce fichier configure le comportement du site sur Netlify :
# - Redirections (URLs propres, anciennes URLs Wix)
# - Headers de sécurité
# - Configuration de build
# =============================================================

[build]
  publish = "."

# =============================================================
# REDIRECTIONS — Compatibilité avec les anciennes URLs Wix
# =============================================================
# Si Google a indexé les anciennes URLs du site Wix, on évite
# les 404 en redirigeant vers les nouvelles pages.

[[redirects]]
  from = "/prestations-bassin-arcachon"
  to = "/prestations.html"
  status = 301
  force = true

[[redirects]]
  from = "/evjf-evg-bassin-arcachon"
  to = "/evj.html"
  status = 301
  force = true

[[redirects]]
  from = "/team-building-bassin-arcachon"
  to = "/team-building.html"
  status = 301
  force = true

[[redirects]]
  from = "/anniversaire-enfants-bassin-arcachon"
  to = "/anniversaires-enfants.html"
  status = 301
  force = true

[[redirects]]
  from = "/location-materiel-evenementiel-bassin-arcachon"
  to = "/locations.html"
  status = 301
  force = true

[[redirects]]
  from = "/structures-gonflables"
  to = "/jeux-gonflables.html"
  status = 301
  force = true

[[redirects]]
  from = "/réalité-virtuelle"
  to = "/realite-virtuelle.html"
  status = 301
  force = true

[[redirects]]
  from = "/trampoline-elastique-sur-remorque"
  to = "/trampoline-elastique.html"
  status = 301
  force = true

[[redirects]]
  from = "/petittrain"
  to = "/petit-train.html"
